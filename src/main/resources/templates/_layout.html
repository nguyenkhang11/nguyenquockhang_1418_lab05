<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="BigSchool - Home page with search functionality">
    <title>Demo Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div style="padding-left: 40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/create}">Products</a>
        <a class="navbar-brand" th:href="@{/categories}">Categories</a>
    </div>

    <div class="d-flex align-items-center" style="gap: 8px; padding-right: 40px;">
        <div sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
            </form>
        </div>
        <div sec:authorize="isAnonymous()">
            <a class="btn btn-outline-primary btn-sm" th:href="@{/login}">Login</a>
        </div>
    </div>

    <form class="d-flex" role="search" th:action="@{/home/search}" th:method="get">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
        <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
</nav>
<div layout:fragment="content" class="container body-content">
</div>
<div class="card-footer text-center">
    <hr/>
</div>
</body>
</html>
