<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}"
      xmlns:custom="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List products</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <div class="d-flex justify-content-between mb-3">
        <div>
            <a th:href="@{/products}" class="btn btn-secondary">Refresh</a>
        </div>
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/products/create}" class="btn btn-primary">Create New Product</a>
        </div>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">Name</th>
                <th scope="col">Price</th>
                <th scope="col">Image</th>
                <th scope="col">Category Name</th>
                <th scope="col"></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${listproduct}">
                <th scope="row" th:text="${product.id}"></th>
                <td th:text="${product.name}"></td>
                <td th:text="${product.price}"></td>
                <td>
                    <img height="120" width="150" th:src="@{/images/} + ${product.image}" alt="Product Image">
                </td>
                <td th:text="${product.category?.name ?: ''}"></td>
                <td>
                    <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-1">
                        <a th:href="@{/products/edit/{id}(id=${product.id})}"
                           custom:linkMethod="post" class="btn btn-secondary">Edit</a>
                        <a th:href="@{/products/delete/{id}(id=${product.id})}"
                           custom:linkMethod="post" class="btn btn-danger">Delete</a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
