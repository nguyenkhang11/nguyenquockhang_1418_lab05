<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3">Danh sach danh muc</h2>
    <a th:href="@{/categories/create}" class="btn btn-primary mb-3">Them danh muc</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>#</th>
                <th>Ten danh muc</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${listcategory}">
                <td th:text="${cat.id}"></td>
                <td th:text="${cat.name}"></td>
                <td>
                    <a th:href="@{/categories/delete/{id}(id=${cat.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Xac nhan xoa?')">Xoa</a>
                </td>
            </tr>
            <tr th:if="${listcategory == null or #lists.isEmpty(listcategory)}">
                <td colspan="3" class="text-center">Chua co danh muc nao.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
